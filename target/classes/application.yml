#配置数据源
spring:
  datasource:
    druid:
      url: jdbc:oracle:thin:@
      username: 
      password: 
      max-active: 20
      max-wait: 5000
      initial-size: 1
      filters: stat,log4j
      validation-query: SELECT 'X' FROM DUAL  #验证连接
      enable: true
    #监控配置
      stat-view-servlet:
        enabled: true
        login-username: 
        login-password: 
        url-pattern: /druid/*

  servlet:
      multipart:
        max-file-size: 10MB
        max-request-size: 50MB

  #thymeleaf的配置
  thymeleaf:
    cache: false
    enabled: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

#配置mybatisplus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

#shiro的配置
shiro:
  hash-algorithm-name: md5
  hash-iterations: 2
  anon-urls:
  - /index.html*
  - /sys/toLogin*
  - /login/login*
  - /login/getCode
  - /resources/**
  - /api/**
  login-url: /index.html
  log-out-url: /login/logout*
  authc-ulrs:
  - /**

#修改端口号为8088
server:
  port: 8888

# 对外暴露的API配置
api:
  token: 