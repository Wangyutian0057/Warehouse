<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>资产出库记录</title>
    <link rel="stylesheet" href="/resources/layui/css/layui.css" media="all"/>
    <link rel="stylesheet" href="/resources/css/public.css" media="all"/>
</head>
<body>
<fieldset class="layui-elem-field layui-field-title" style="margin-top: 15px;">
    <legend>查询条件</legend>
</fieldset>
<form action="" method="post" id="searchFrm" lay-filter="searchFrm" class="layui-form">
    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">开始时间</label>
            <div class="layui-input-inline">
                <input type="text" name="startTime" id="startTime" readonly class="layui-input input-radius" placeholder="yyyy-MM-dd HH:mm:ss">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label">结束时间</label>
            <div class="layui-input-inline">
                <input type="text" name="endTime" id="endTime" readonly class="layui-input input-radius" placeholder="yyyy-MM-dd HH:mm:ss">
            </div>
        </div>
        <div class="layui-inline">
            <button type="button" class="layui-btn layui-btn-sm layui-btn-radius" lay-submit="" lay-filter="doSearch"><i class="layui-icon layui-icon-search"></i>查询</button>
            <button type="reset" class="layui-btn layui-btn-sm layui-btn-radius layui-btn-warm"><i class="layui-icon layui-icon-refresh"></i>重置</button>
        </div>
    </div>
</form>

<div>
    <table class="layui-hide" id="recordTable" lay-filter="recordTable"></table>
    <div id="recordToolBar" style="display: none">
        <button type="button" lay-event="export" class="layui-btn layui-btn-sm layui-btn-primary layui-btn-radius">
            <i class="layui-icon layui-icon-export"></i>导出记录
        </button>
    </div>
    <div id="recordRowBar" style="display: none;">
        <button type="button" lay-event="update" class="layui-btn layui-btn-xs layui-btn-radius"><i class="layui-icon layui-icon-edit"></i>修改</button>
        <button type="button" lay-event="delete" class="layui-btn layui-btn-xs layui-btn-danger layui-btn-radius"><i class="layui-icon layui-icon-delete"></i>取消出库</button>
    </div>
</div>

<div id="updateDiv" style="display: none;padding: 10px;">
    <form action="" method="post" class="layui-form" id="dataFrm" lay-filter="dataFrm">
        <input type="hidden" name="id">
        <div class="layui-form-item">
            <label class="layui-form-label">申请人</label>
            <div class="layui-input-block">
                <input type="text" name="applicant" class="layui-input input-radius" placeholder="申请人">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">备注</label>
            <div class="layui-input-block">
                <textarea name="remark" class="layui-textarea"></textarea>
            </div>
        </div>
        <div class="layui-form-item" style="text-align: center;">
            <button type="button" class="layui-btn layui-btn-radius" lay-submit="" lay-filter="doSubmit">提交</button>
        </div>
    </form>
</div>

<script type="text/javascript" src="/resources/layui/layui.js"></script>
<script type="text/javascript">
    var tableIns;
    layui.use(['jquery', 'form', 'layer', 'table', 'laydate'], function () {
        var $ = layui.jquery;
        var form = layui.form;
        var layer = layui.layer;
        var table = layui.table;
        var laydate = layui.laydate;

        laydate.render({elem:'#startTime', type:'datetime'});
        laydate.render({elem:'#endTime', type:'datetime'});

        tableIns = table.render({
            elem: "#recordTable",
            url: "/assetRecord/loadAllAssetRecord?direction=OUT",
            toolbar: "#recordToolBar",
            page: true,
            cols: [ [
                {field: 'id', title: 'ID', width: 60, align: 'center'},
                {field: 'maintenanceId', title: '运维编号', align: 'center'},
                {field: 'assetType', title: '类型', align: 'center'},
                {field: 'assetBrand', title: '品牌', align: 'center'},
                {field: 'type', title: '出库类型', align: 'center'},
                {field: 'applicant', title: '领用人', align: 'center'},
                {field: 'createtime', title: '出库时间', align: 'center'},
                {field: 'operator', title: '操作人', align: 'center'},
                {field: 'remark', title: '备注', align: 'center'},
                {fixed: 'right', title: '操作', toolbar: '#recordRowBar', align: 'center', width: 220}
            ] ]
        });

        form.on("submit(doSearch)", function (data) {
            tableIns.reload({where: data.field, page: {curr: 1}});
            return false;
        });

        table.on("toolbar(recordTable)", function (obj) {
            if(obj.event === 'export'){
                var params = $("#searchFrm").serialize();
                window.location.href="/assetRecord/exportRecord?direction=OUT&" + params;
            }
        });

        table.on("tool(recordTable)", function (obj) {
            var data = obj.data;
            if (obj.event === 'delete') {
                layer.confirm('确定取消该出库操作吗？这将恢复库存状态。', function (index) {
                    $.post("/assetOutport/deleteOutport", {id: data.id}, function (res) {
                        if (res.code == 200) tableIns.reload();
                        layer.msg(res.msg);
                    });
                    layer.close(index);
                });
            } else if (obj.event === 'update') {
                openUpdateLayer(data);
            }
        });

        var mainIndex;
        function openUpdateLayer(data) {
            mainIndex = layer.open({
                type: 1,
                content: $("#updateDiv"),
                area: ['500px', '300px'],
                title: '修改记录',
                success: function () {
                    $("#dataFrm")[0].reset();
                    form.val("dataFrm", data);
                }
            });
        }

        form.on("submit(doSubmit)", function (data) {
            $.post("/assetOutport/updateOutport", data.field, function (res) {
                if (res.code == 200) tableIns.reload();
                layer.msg(res.msg);
                layer.close(mainIndex);
            });
            return false;
        });
    });
</script>
</body>
</html>
