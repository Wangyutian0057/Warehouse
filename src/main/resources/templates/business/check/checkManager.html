<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>库存盘点管理</title>
    <link rel="stylesheet" href="/resources/layui/css/layui.css" media="all"/>
    <link rel="stylesheet" href="/resources/css/public.css" media="all"/>
</head>
<body>
<!-- Search -->
<fieldset class="layui-elem-field layui-field-title" style="margin-top: 15px;">
    <legend>查询条件</legend>
</fieldset>
<form action="" method="post" id="searchFrm" lay-filter="searchFrm" class="layui-form">
    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">盘点标题</label>
            <div class="layui-input-inline">
                <input type="text" name="title" class="layui-input input-radius" placeholder="请输入标题">
            </div>
        </div>
        <div class="layui-inline">
            <button type="button" class="layui-btn layui-btn-sm layui-btn-radius" lay-submit="" lay-filter="doSearch"><i class="layui-icon layui-icon-search"></i>查询</button>
            <button type="reset" class="layui-btn layui-btn-sm layui-btn-radius layui-btn-warm"><i class="layui-icon layui-icon-refresh"></i>重置</button>
        </div>
    </div>
</form>

<!-- Table -->
<div style="padding: 10px;">
    <table class="layui-hide" id="checkTable" lay-filter="checkTable"></table>
    <div id="checkToolBar" style="display: none">
        <button type="button" lay-event="add" class="layui-btn layui-btn-sm layui-btn-normal layui-btn-radius">
            <i class="layui-icon layui-icon-add-1"></i>开始新盘点
        </button>
    </div>
    <div id="checkRowBar" style="display: none;">
        <button type="button" lay-event="view" class="layui-btn layui-btn-xs layui-btn-radius">盘点详情</button>
        <button type="button" lay-event="export" class="layui-btn layui-btn-xs layui-btn-normal layui-btn-radius">导出Excel</button>
        {{#  if(d.status == 0){ }}
        <button type="button" lay-event="finish" class="layui-btn layui-btn-xs layui-btn-warm layui-btn-radius">结束并校正</button>
        {{#  } else { }}
        <button type="button" lay-event="archive" class="layui-btn layui-btn-xs layui-btn-danger layui-btn-radius">历史归档</button>
        {{#  } }}
    </div>
</div>

<!-- Add Check Popup -->
<div id="addCheckDiv" style="display: none;padding: 10px;">
    <form action="" method="post" class="layui-form" id="addCheckFrm" lay-filter="addCheckFrm">
        <div class="layui-form-item">
            <label class="layui-form-label">盘点标题</label>
            <div class="layui-input-block">
                <input type="text" name="title" lay-verify="required" class="layui-input input-radius" placeholder="例如：2024第一季度盘点">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">备注</label>
            <div class="layui-input-block">
                <textarea name="remark" class="layui-textarea" placeholder="请输入备注"></textarea>
            </div>
        </div>
        <div class="layui-form-item" style="text-align: center;">
            <button type="button" class="layui-btn layui-btn-radius" lay-submit="" lay-filter="doSubmitCheck">开始盘点</button>
        </div>
    </form>
</div>

<!-- Detail Popup -->
<div id="checkDetailDiv" style="display: none;padding: 10px; height: 100%;">
    <div class="layui-tab layui-tab-brief" lay-filter="docDemoTabBrief">
        <ul class="layui-tab-title">
            <li class="layui-this">资产盘点</li>
            <li>耗材盘点</li>
        </ul>
        <div class="layui-tab-content" style="height: 400px; overflow: auto;">
            <div class="layui-tab-item layui-show">
                <div class="layui-elem-quote">点击“实盘状态”列可直接修改 (IN_STOCK / OUT)</div>
                <table id="checkAssetTable" lay-filter="checkAssetTable"></table>
            </div>
            <div class="layui-tab-item">
                <div class="layui-elem-quote">点击“实盘数量”列可直接修改</div>
                <table id="checkConsumableTable" lay-filter="checkConsumableTable"></table>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="/resources/layui/layui.js"></script>
<script type="text/javascript">
    layui.use(['jquery', 'form', 'layer', 'table', 'element'], function () {
        var $ = layui.jquery;
        var form = layui.form;
        var layer = layui.layer;
        var table = layui.table;
        var element = layui.element;

        var tableIns = table.render({
            elem: "#checkTable",
            url: "/check/loadAllCheck",
            toolbar: "#checkToolBar",
            page: true,
            cols: [ [
                {field: 'id', title: 'ID', align: 'center', width: 80},
                {field: 'title', title: '标题', align: 'center'},
                {field: 'createTime', title: '开始时间', align: 'center'},
                {field: 'finishTime', title: '结束时间', align: 'center'},
                {field: 'operName', title: '操作人', align: 'center'},
                {field: 'status', title: '状态', align: 'center', templet: function(d){
                    return d.status == 0 ? '<span class="layui-badge layui-bg-blue">进行中</span>' : '<span class="layui-badge layui-bg-green">已结束</span>';
                }},
                {fixed: 'right', title: '操作', toolbar: '#checkRowBar', align: 'center', width: 250}
            ] ]
        });

        // Search
        form.on("submit(doSearch)", function (data) {
            tableIns.reload({where: data.field, page: {curr: 1}});
            return false;
        });

        // Toolbar Events
        table.on("toolbar(checkTable)", function (obj) {
            if (obj.event === 'add') {
                openAddCheckLayer();
            }
        });

        // Row Events
        table.on("tool(checkTable)", function (obj) {
            var data = obj.data;
            if (obj.event === 'view') {
                openCheckDetail(data);
            } else if (obj.event === 'export') {
                window.location.href = "/check/exportCheck?id=" + data.id;
            } else if (obj.event === 'finish') {
                // Check for mismatches first
                $.get("/check/getCheckMismatchCount", {id: data.id}, function(res) {
                    var mismatchCount = parseInt(res.msg);
                    var msg = '确定要结束盘点吗？系统将根据盘点结果自动修正库存！';
                    if (mismatchCount > 0) {
                        msg = '系统检测到有 <span style="color:red;font-weight:bold">' + mismatchCount + '</span> 项资产或耗材数据不一致。<br>结束盘点将<span style="color:red">自动更新这些数据</span>并生成平账记录。<br>是否继续？';
                    }
                    
                    layer.confirm(msg, {icon: 3, title:'提示'}, function(index){
                        $.post("/check/finishCheck", {id: data.id}, function(res){
                            layer.msg(res.msg);
                            tableIns.reload();
                        });
                        layer.close(index);
                    });
                });
            } else if (obj.event === 'archive') {
                layer.confirm('确定要归档该盘点日期之前的历史记录吗？此操作不可逆！<br><span style="color:red;font-weight:bold;">警告：归档将删除当前的出入库记录！请确保已手动下载备份！</span>', function(index){
                    $.post("/check/archiveCheck", {id: data.id}, function(res){
                        if(res.code == 200) {
                            layer.msg("归档成功！历史记录已移除。");
                        } else {
                            layer.msg(res.msg);
                        }
                    });
                    layer.close(index);
                });
            }
        });

        // Add Check Layer
        var mainIndex;
        function openAddCheckLayer() {
            mainIndex = layer.open({
                type: 1,
                content: $("#addCheckDiv"),
                area: ['500px', '300px'],
                title: '开始新盘点',
                success: function () {
                    $("#addCheckFrm")[0].reset();
                }
            });
        }

        form.on("submit(doSubmitCheck)", function (data) {
            $.post("/check/addCheck", data.field, function (res) {
                if (res.code == 200) {
                    tableIns.reload();
                    layer.close(mainIndex);
                }
                layer.msg(res.msg);
            });
            return false;
        });

        // Detail Layer
        function openCheckDetail(data) {
            layer.open({
                type: 1,
                content: $("#checkDetailDiv"),
                area: ['90%', '90%'],
                title: '盘点详情 - ' + data.title,
                success: function () {
                    // Load Asset Table
                    table.render({
                        elem: "#checkAssetTable",
                        url: "/check/loadCheckAssets?checkId=" + data.id,
                        cols: [ [
                            {field: 'assetName', title: '资产名称', width: 200},
                            {field: 'assetNo', title: '资产编号', width: 150},
                            {field: 'location', title: '系统位置', width: 150},
                            {field: 'actualLocation', title: '实盘位置', width: 150, edit: 'text', style: 'background-color: #f2f2f2; color: #ff5722;'},
                            {field: 'expectedStatus', title: '系统状态', width: 100},
                            {field: 'actualStatus', title: '实盘状态', width: 100, edit: 'text', style: 'background-color: #f2f2f2; color: #ff5722;'},
                            {field: 'result', title: '结果', width: 100},
                            {field: 'remark', title: '备注', edit: 'text'}
                        ] ]
                    });

                    // Load Consumable Table
                    table.render({
                        elem: "#checkConsumableTable",
                        url: "/check/loadCheckConsumables?checkId=" + data.id,
                        cols: [ [
                            {field: 'consumableName', title: '耗材名称', width: 200},
                            {field: 'location', title: '位置', width: 150},
                            {field: 'expectedQuantity', title: '账面数量', width: 100},
                            {field: 'actualQuantity', title: '实盘数量', width: 100, edit: 'text', style: 'background-color: #f2f2f2; color: #ff5722;'},
                            {field: 'diffQuantity', title: '差异', width: 100, templet: function(d){
                                if(d.diffQuantity > 0) return '<span style="color:green">+' + d.diffQuantity + '</span>';
                                if(d.diffQuantity < 0) return '<span style="color:red">' + d.diffQuantity + '</span>';
                                return '0';
                            }},
                            {field: 'remark', title: '备注', edit: 'text'}
                        ] ]
                    });
                }
            });
        }

        // Listen for edits
        table.on('edit(checkAssetTable)', function(obj){
            var value = obj.value; // modified value
            var data = obj.data; // row data
            $.post("/check/updateCheckAsset", data, function(res){
                // layer.msg(res.msg);
                // Reload to update 'result' column
                table.reload('checkAssetTable', {
                    url: "/check/loadCheckAssets?checkId=" + data.checkId // Ensure URL is correct, or just reload current
                });
            });
        });

        table.on('edit(checkConsumableTable)', function(obj){
            var value = obj.value;
            var data = obj.data;
            $.post("/check/updateCheckConsumable", data, function(res){
                if(res.code == 200) {
                   // Refresh to calc diff
                   // table.reload('checkConsumableTable'); // Reloading might lose focus
                }
            });
        });

    });
</script>
</body>
</html>
