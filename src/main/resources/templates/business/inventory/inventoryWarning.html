<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>库存预警</title>
    <link rel="stylesheet" href="/resources/layui/css/layui.css" media="all"/>
    <link rel="stylesheet" href="/resources/css/public.css" media="all"/>
</head>
<body>
<fieldset class="layui-elem-field layui-field-title" style="margin-top: 15px;">
    <legend>低于安全库存阈值物资列表</legend>
</fieldset>
<table class="layui-hide" id="warningTable" lay-filter="warningTable"></table>
<script type="text/javascript" src="/resources/layui/layui.js"></script>
<script type="text/javascript">
    layui.use(['table'], function () {
        var table = layui.table;
        table.render({
            elem: "#warningTable",
            url: "/consumable/loadWarningConsumable",
            page: true,
            cols: [ [
                {field: 'type', title: '耗材名称', width: 150},
                {field: 'quantity', title: '当前数量', width: 150, templet: function(d){ return '<span style="color:red;font-weight:bold">'+d.quantity+'</span>'}},
                {field: 'threshold', title: '安全阈值', width: 150},
                {field: 'location', title: '存放位置', width: 150}
            ] ]
        });
    });
</script>
</body>
</html>
