<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <meta charset="UTF-8">
    <title>耗材管理</title>
    <link rel="stylesheet" href="/resources/layui/css/layui.css" media="all"/>
    <link rel="stylesheet" href="/resources/css/public.css" media="all"/>
</head>
<body>
<fieldset class="layui-elem-field layui-field-title" style="margin-top: 15px;">
    <legend>查询条件</legend>
</fieldset>
<form action="" method="post" id="searchFrm" lay-filter="searchFrm" class="layui-form">
    <div class="layui-form-item">
        <div class="layui-inline">
            <label class="layui-form-label">耗材名称</label>
            <div class="layui-input-inline">
                <input type="text" name="type" class="layui-input input-radius" placeholder="请输入耗材名称/类型">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label">开始时间</label>
            <div class="layui-input-inline">
                <input type="text" name="startTime" id="startTime" readonly class="layui-input input-radius" placeholder="yyyy-MM-dd HH:mm:ss">
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label">结束时间</label>
            <div class="layui-input-inline">
                <input type="text" name="endTime" id="endTime" readonly class="layui-input input-radius" placeholder="yyyy-MM-dd HH:mm:ss">
            </div>
        </div>
        <div class="layui-inline">
            <button type="button" class="layui-btn layui-btn-sm layui-btn-radius" lay-submit="" lay-filter="doSearch"><i class="layui-icon layui-icon-search"></i>查询</button>
            <button type="reset" class="layui-btn layui-btn-sm layui-btn-radius layui-btn-warm"><i class="layui-icon layui-icon-refresh"></i>重置</button>
        </div>
    </div>
</form>

<div>
    <table class="layui-hide" id="consumableTable" lay-filter="consumableTable"></table>
    <div id="consumableToolBar" style="display: none">
        <shiro:hasPermission name="consumable:inport">
            <button type="button" lay-event="add" class="layui-btn layui-btn-sm layui-btn-normal layui-btn-radius">
                <i class="layui-icon layui-icon-add-1"></i>耗材入库
            </button>
        </shiro:hasPermission>
        <shiro:lacksPermission name="consumable:inport">
            <button type="button" lay-event="" class="layui-btn layui-btn-sm layui-btn-disabled layui-btn-radius">
                <i class="layui-icon layui-icon-add-1"></i>耗材入库
            </button>
        </shiro:lacksPermission>

        <shiro:hasPermission name="consumable:inport">
            <button type="button" lay-event="batchImport" class="layui-btn layui-btn-sm layui-btn-warm layui-btn-radius">
                <i class="layui-icon layui-icon-upload-drag"></i>批量导入
            </button>
        </shiro:hasPermission>
        <shiro:lacksPermission name="consumable:inport">
            <button type="button" lay-event="" class="layui-btn layui-btn-sm layui-btn-disabled layui-btn-radius">
                <i class="layui-icon layui-icon-upload-drag"></i>批量导入
            </button>
        </shiro:lacksPermission>

        <button type="button" lay-event="downloadTemplate" class="layui-btn layui-btn-sm layui-btn-primary layui-btn-radius">
            <i class="layui-icon layui-icon-download-circle"></i>下载模板
        </button>
        <shiro:hasPermission name="consumable:delete">
            <button type="button" lay-event="batchDelete" class="layui-btn layui-btn-sm layui-btn-danger layui-btn-radius">
                <i class="layui-icon layui-icon-delete"></i>批量删除
            </button>
        </shiro:hasPermission>
    </div>
    <div id="consumableRowBar" style="display: none;">
        <shiro:hasPermission name="consumable:update">
            <button type="button" lay-event="update" class="layui-btn layui-btn-xs layui-btn-radius"><i class="layui-icon layui-icon-edit"></i>修改</button>
        </shiro:hasPermission>
        <shiro:lacksPermission name="consumable:update">
            <button type="button" lay-event="" class="layui-btn layui-btn-xs layui-btn-disabled layui-btn-radius"><i class="layui-icon layui-icon-edit"></i>修改</button>
        </shiro:lacksPermission>

        <shiro:hasPermission name="consumable:delete">
            <button type="button" lay-event="delete" class="layui-btn layui-btn-xs layui-btn-danger layui-btn-radius"><i class="layui-icon layui-icon-delete"></i>删除</button>
        </shiro:hasPermission>
        <shiro:lacksPermission name="consumable:delete">
            <button type="button" lay-event="" class="layui-btn layui-btn-xs layui-btn-disabled layui-btn-radius"><i class="layui-icon layui-icon-delete"></i>删除</button>
        </shiro:lacksPermission>

        <shiro:hasPermission name="consumable:inport">
            <button type="button" lay-event="inport" class="layui-btn layui-btn-xs layui-btn-normal layui-btn-radius"><i class="layui-icon layui-icon-add-circle"></i>入库</button>
        </shiro:hasPermission>
        <shiro:lacksPermission name="consumable:inport">
            <button type="button" lay-event="" class="layui-btn layui-btn-xs layui-btn-disabled layui-btn-radius"><i class="layui-icon layui-icon-add-circle"></i>入库</button>
        </shiro:lacksPermission>

        <shiro:hasPermission name="consumable:outport">
            <button type="button" lay-event="outport" class="layui-btn layui-btn-xs layui-btn-warm layui-btn-radius"><i class="layui-icon layui-icon-export"></i>出库</button>
        </shiro:hasPermission>
        <shiro:lacksPermission name="consumable:outport">
            <button type="button" lay-event="" class="layui-btn layui-btn-xs layui-btn-disabled layui-btn-radius"><i class="layui-icon layui-icon-export"></i>出库</button>
        </shiro:lacksPermission>
    </div>
</div>

<!-- 入库弹出层 (已有耗材添加库存) -->
<div id="inportDiv" style="display: none;padding: 10px;">
    <form action="" method="post" class="layui-form" id="inportFrm" lay-filter="inportFrm">
        <input type="hidden" name="id">
        <div class="layui-form-item">
            <label class="layui-form-label">入库来源</label>
            <div class="layui-input-block">
                <select name="source">
                    <option value="采购入库">采购入库</option>
                    <option value="备件入库">备件入库</option>
                    <option value="捐赠入库">捐赠入库</option>
                    <option value="借用入库">借用入库</option>
                    <option value="其他来源">其他来源</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">入库数量</label>
            <div class="layui-input-block">
                <input type="number" name="quantity" lay-verify="required|number" class="layui-input input-radius" placeholder="请输入入库数量">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">备注说明</label>
            <div class="layui-input-block">
                <textarea name="remark" class="layui-textarea" placeholder="请输入备注说明"></textarea>
            </div>
        </div>
        <div class="layui-form-item" style="text-align: center;">
            <button type="button" class="layui-btn layui-btn-radius" lay-submit="" lay-filter="doInport">确认入库</button>
        </div>
    </form>
</div>

<!-- 出库弹出层 -->
<div id="outportDiv" style="display: none;padding: 10px;">
    <form action="" method="post" class="layui-form" id="outportFrm" lay-filter="outportFrm">
        <input type="hidden" name="consumableId">
        <div class="layui-form-item">
            <label class="layui-form-label">出库类型</label>
            <div class="layui-input-block">
                <select name="type">
                    <option value="领用出库">领用出库</option>
                    <option value="借用出库">借用出库</option>
                    <option value="报废出库">报废出库</option>
                    <option value="调拨出库">调拨出库</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">出库数量</label>
            <div class="layui-input-block">
                <input type="number" name="quantity" lay-verify="required|number" class="layui-input input-radius" placeholder="请输入出库数量">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">申请人</label>
            <div class="layui-input-block">
                <select name="applicant" lay-verify="required" lay-search id="applicantSelect">
                    <option value="">请输入或选择申请人</option>
                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">备注说明</label>
            <div class="layui-input-block">
                <textarea name="remark" class="layui-textarea" placeholder="请输入备注说明"></textarea>
            </div>
        </div>
        <div class="layui-form-item" style="text-align: center;">
            <button type="button" class="layui-btn layui-btn-radius" lay-submit="" lay-filter="doOutport">确认出库</button>
        </div>
    </form>
</div>

<!-- 添加/修改弹出层 -->
<div id="addOrUpdateDiv" style="display: none;padding: 10px;">
    <form action="" method="post" class="layui-form" id="dataFrm" lay-filter="dataFrm">
        <input type="hidden" name="id">
        <div class="layui-form-item">
            <div class="layui-inline">
                <label class="layui-form-label">耗材名称</label>
                <div class="layui-input-inline">
                    <input type="text" name="type" lay-verify="required" class="layui-input input-radius" placeholder="请输入耗材名称/类型">
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">入库来源</label>
                <div class="layui-input-inline">
                    <select name="source">
                        <option value="采购入库">采购入库</option>
                        <option value="备件入库">备件入库</option>
                        <option value="捐赠入库">捐赠入库</option>
                        <option value="借用入库">借用入库</option>
                        <option value="其他来源">其他来源</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="layui-form-item">
            <div class="layui-inline">
                <label class="layui-form-label">入库数量</label>
                <div class="layui-input-inline">
                    <input type="number" name="inportQuantity" id="inportQuantity" class="layui-input input-radius" placeholder="请输入本次入库数量">
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">当前库存</label>
                <div class="layui-input-inline">
                    <input type="number" name="quantity" id="currentQuantity" class="layui-input input-radius layui-disabled" disabled placeholder="系统自动计算">
                </div>
            </div>
        </div>
        <div class="layui-form-item">
            <div class="layui-inline">
                <label class="layui-form-label">存放位置</label>
                <div class="layui-input-inline">
                    <input type="text" name="location" class="layui-input input-radius" placeholder="仓库位置">
                </div>
            </div>
            <div class="layui-inline">
                <label class="layui-form-label">库存阈值</label>
                <div class="layui-input-inline">
                    <input type="number" name="threshold" class="layui-input input-radius" placeholder="安全库存预警阈值">
                </div>
            </div>
        </div>
        <div class="layui-form-item">
            <div class="layui-input-block" style="text-align: center;">
                <button type="button" class="layui-btn layui-btn-radius" lay-submit="" lay-filter="doSubmit"><i class="layui-icon layui-icon-search layui-icon-normal"></i>提交</button>
                <button type="reset" class="layui-btn layui-btn-radius layui-btn-warm"><i class="layui-icon layui-icon-refresh"></i>重置</button>
            </div>
        </div>
    </form>
</div>

<!-- 导入弹出层 -->
<div id="importDiv" style="display: none;padding: 10px;text-align: center;">
    <div class="layui-upload-drag" id="uploadFile">
      <i class="layui-icon"></i>
      <p>点击上传，或将文件拖拽到此处</p>
    </div>
</div>

<script type="text/javascript" src="/resources/layui/layui.js"></script>
<script type="text/javascript">
    var tableIns;
    layui.use(['jquery', 'form', 'layer', 'table', 'laydate', 'upload'], function () {
        var $ = layui.jquery;
        var form = layui.form;
        var layer = layui.layer;
        var table = layui.table;
        var laydate = layui.laydate;
        var upload = layui.upload;

        // 初始化加载下拉框
        initApplicantSelect();

        function initApplicantSelect() {
            var data = [
                {name:'董升'}, {name:'吴斌'}, {name:'贺嫣'}, {name:'陆培德'}, 
                {name:'温常青'},{name:'胡燕峰'},{name:'袁圆'}, {name:'冯洲豪'}, 
                {name:'孙磊'},{name:'吴亮'},{name:'张广纬'}, {name:'沈惠银'}, 
                {name:'张巧静'},{name:'宣明芬'},{name:'金纵横'}, {name:'王宁怡'}, 
                {name:'王禹添'},{name:'汤健凯'},{name:'贺少常'}, {name:'蔡豪斌'}, 
                {name:'樊俊'},{name:'潘欣'},{name:'黎超'},{name:'王臻'}, 
                {name:'徐文达'},{name:'虞圆浩'},{name:'贺坚宁'}, {name:'刘博宁'}, 
                {name:'胡瑜'}, {name:'王明杰'}, {name:'王波'}, {name:'蒋晓'},{name:'苗展鹏'},{name:'备用人员'}
            ];
            
            var html = '<option value="">请输入或选择申请人</option>';
            $.each(data, function(index, item){
                html += '<option value="'+item.name+'">' + item.name + '</option>';
            });
            $("#applicantSelect").html(html);
            form.render("select");
        }





        laydate.render({elem:'#startTime', type:'datetime'});
        laydate.render({elem:'#endTime', type:'datetime'});

        tableIns = table.render({
            elem: "#consumableTable",
            url: "/consumable/loadAllConsumable",
            toolbar: "#consumableToolBar",
            page: true,
            cols: [ [
                {type: 'checkbox'},
                {field: 'id', title: 'ID', align: 'center', width: '60'},
                {field: 'type', title: '耗材名称/类型', align: 'center', width: '150'},
                {field: 'quantity', title: '当前库存', align: 'center', width: '100', templet: function(d){
                    return d.quantity < d.threshold ? '<span class="layui-badge">'+d.quantity+'</span>' : d.quantity;
                }},
                {field: 'location', title: '存放位置', align: 'center', width: '150'},
                {field: 'threshold', title: '预警阈值', align: 'center', width: '100'},
                {field: 'insertTime', title: '入库时间', align: 'center', width: '160'},
                {field: 'updateTime', title: '更新时间', align: 'center', width: '160'},
                {fixed: 'right', title: '操作', toolbar: '#consumableRowBar', align: 'center', width: '380'}
            ] ]
        });

        form.on("submit(doSearch)", function (data) {
            tableIns.reload({where: data.field, page: {curr: 1}});
            return false;
        });

        table.on("toolbar(consumableTable)", function (obj) {
            switch(obj.event) {
                case 'add': openAddLayer(); break;
                case 'batchImport': openImportLayer(); break;
                case 'downloadTemplate': window.location.href="/consumableInport/downloadTemplate"; break;
                case 'batchDelete': batchDelete(); break;
            }
        });

        table.on("tool(consumableTable)", function (obj) {
            var data = obj.data;
            if (obj.event === 'delete') deleteConsumable(data);
            else if (obj.event === 'update') updateConsumable(data);
            else if (obj.event === 'outport') openOutportLayer(data);
            else if (obj.event === 'inport') openInportLayer(data);
        });

        var mainIndex;
        var url;

        function openInportLayer(data) {
            mainIndex = layer.open({
                type: 1,
                content: $("#inportDiv"),
                area: ['400px', '300px'],
                title: '耗材入库办理',
                success: function () {
                    $("#inportFrm")[0].reset();
                    $("#inportFrm input[name='id']").val(data.id);
                }
            });
        }

        form.on("submit(doInport)", function (data) {
            $.post("/consumableInport/addStock", data.field, function (res) {
                if (res.code == 200) tableIns.reload();
                layer.msg(res.msg);
                layer.close(mainIndex);
            });
            return false;
        });

        function openOutportLayer(data) {
            mainIndex = layer.open({
                type: 1,
                content: $("#outportDiv"),
                area: ['600px', '400px'],
                title: '耗材出库办理',
                success: function () {
                    $("#outportFrm")[0].reset();
                    $("input[name='consumableId']").val(data.id);
                }
            });
        }

        form.on("submit(doOutport)", function (data) {
            $.post("/consumableOutport/addConsumableOutport", data.field, function (res) {
                if (res.code == 200) tableIns.reload();
                layer.msg(res.msg);
                layer.close(mainIndex);
            });
            return false;
        });

        function openAddLayer() {
            mainIndex = layer.open({
                type: 1,
                content: $("#addOrUpdateDiv"),
                area: ['800px', '400px'],
                title: '耗材入库登记',
                success: function () {
                    $("#dataFrm")[0].reset();
                    // 新增时，当前库存不可编辑且为空，主要填写本次入库数量
                    $("#inportQuantity").removeAttr("disabled");
                    $("#currentQuantity").attr("disabled", "disabled").val(""); 
                    url = "/consumableInport/addConsumableInport";
                }
            });
        }
        
        function openImportLayer() {
            mainIndex = layer.open({
                type: 1,
                content: $("#importDiv"),
                area: ['400px', '300px'],
                title: '批量导入耗材',
                success: function (layero, index) {
                    var loadIndex;
                    upload.render({
                        elem: layero.find('#uploadFile'),
                        url: '/consumableInport/batchImport',
                        accept: 'file',
                        exts: 'xls|xlsx',
                        before: function(obj){
                            loadIndex = layer.load(2, {shade: [0.3, '#333']}); // 上传时显示等待层
                        },
                        done: function(res){
                            layer.close(loadIndex);
                            layer.msg(res.msg);
                            layer.close(mainIndex);
                            tableIns.reload();
                        },
                        error: function(){
                            layer.close(loadIndex);
                            layer.msg('上传过程中出现网络异常或服务器错误', {icon: 2});
                        }
                    });
                }
            });
        }

        function updateConsumable(data) {
            mainIndex = layer.open({
                type: 1,
                content: $("#addOrUpdateDiv"),
                area: ['800px', '400px'],
                title: '修改耗材信息',
                success: function () {
                    $("#dataFrm")[0].reset();
                    form.val("dataFrm", data);
                    // 修改时，不进行入库操作，只修改基础信息
                    $("#inportQuantity").attr("disabled", "disabled").val("0").attr("placeholder", "修改模式下不可入库");
                    $("#currentQuantity").val(data.quantity);
                    url = "/consumable/updateConsumable";
                }
            });
        }

        form.on("submit(doSubmit)", function (data) {
            $.post(url, data.field, function (res) {
                if (res.code == 200) tableIns.reload();
                layer.msg(res.msg);
                layer.close(mainIndex);
            });
            return false;
        });

        function deleteConsumable(data) {
            layer.confirm('确定要删除耗材【' + data.type + '】吗？', function (index) {
                $.post("/consumable/deleteConsumable", {id: data.id}, function (res) {
                    if (res.code == 200) tableIns.reload();
                    layer.msg(res.msg);
                });
                layer.close(index);
            });
        }

        // 批量删除
        function batchDelete() {
            var checkStatus = table.checkStatus('consumableTable');
            var data = checkStatus.data;
            if(data.length > 0){
                layer.confirm('确定要删除选中的 ' + data.length + ' 条记录吗？此操作不可恢复！', {icon: 3, title: '提示'}, function(index){
                    var ids = [];
                    $.each(data, function(index, item){
                        ids.push(item.id);
                    });
                    $.post("/consumable/batchDeleteConsumable", {ids: ids.join(",")}, function(res){
                        if(res.code == 200){
                            tableIns.reload();
                            layer.msg("成功删除 " + data.length + " 条记录");
                        }else{
                            layer.msg(res.msg);
                        }
                    });
                    layer.close(index);
                });
            }else{
                layer.msg("请选中要删除的记录");
            }
        }

        // 键盘快捷键支持
        $(document).on('keydown', function(e){
            // Delete键触发删除
            if(e.keyCode == 46) {
                batchDelete();
            }
            // Ctrl+A 全选
            if(e.ctrlKey && e.keyCode == 65) {
                // 模拟点击表头的全选复选框
                $('div[lay-id="consumableTable"] .layui-table-header .layui-form-checkbox').click();
                e.preventDefault(); // 阻止默认的全选文本行为
            }
        });
    });
</script>
</body>
</html>
