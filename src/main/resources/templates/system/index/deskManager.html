<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<title>工作台 - 仓库管理系统</title>
	<meta name="renderer" content="webkit">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="format-detection" content="telephone=no">
	<link rel="stylesheet" href="/resources/layui/css/layui.css" media="all" />
	<link rel="stylesheet" href="/resources/css/public.css" media="all" />
</head>
<body class="childrenBody">
	<blockquote class="layui-elem-quote layui-bg-green">
		<div id="nowTime"></div>
	</blockquote>
	<div class="layui-row layui-col-space10">
		<div class="layui-col-lg6 layui-col-md12">
			<blockquote class="layui-elem-quote title">最新公告 <i class="layui-icon layui-red">&#xe756;</i></blockquote>
			<table class="layui-table mag0" lay-skin="line">
				<colgroup>
					<col>
					<col width="110">
				</colgroup>
				<tbody class="hot_news"></tbody>
			</table>
		</div>
		<div class="layui-col-lg6 layui-col-md12">
			<blockquote class="layui-elem-quote title">库存预警 <i class="layui-icon layui-red">&#xe756;</i></blockquote>
			<table class="layui-table mag0" lay-skin="line">
				<colgroup>
					<col>
					<col width="200">
				</colgroup>
				<tbody class="warningGoods"></tbody>
			</table>
		</div>
	</div>

    <div class="layui-row layui-col-space10">
        <div class="layui-col-lg6 layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">库存概览</div>
                <div class="layui-card-body">
                    <div id="stockChart" style="width: 100%;height:400px;"></div>
                </div>
            </div>
        </div>
        <div class="layui-col-lg6 layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">近30天耗材出入库趋势</div>
                <div class="layui-card-body">
                    <div id="trendChart" style="width: 100%;height:400px;"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="layui-row layui-col-space10">
        <div class="layui-col-lg6 layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">资产类型分布 (在库)</div>
                <div class="layui-card-body">
                    <div id="assetTypeChart" style="width: 100%;height:400px;"></div>
                </div>
            </div>
        </div>
        <div class="layui-col-lg6 layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">资产类型分布 (不在库)</div>
                <div class="layui-card-body">
                    <div id="assetOutTypeChart" style="width: 100%;height:400px;"></div>
                </div>
            </div>
        </div>
    </div>

	<!-- 查看公告的div -->
	<div id="desk_viewNewsDiv" style="padding: 10px;display: none;">
		<h2 id="view_title" align="center"></h2>
		<hr>
		<div style="text-align: right;">
			发布人:<span id="view_opername"></span>
			<span style="display: inline-block;width: 20px" ></span>
			发布时间:<span id="view_createtime"></span>
		</div>
		<hr>
		<div id="view_content"></div>
	</div>

	<script type="text/javascript" src="/resources/layui/layui.js"></script>
    <script type="text/javascript" src="/resources/js/echarts.min.js"></script>
	
	<script type="text/javascript">
	//获取当前登陆人
	var currentUserName='[[${session.user.name}]]';

	//获取系统时间
	var newDate = '';
	getLangDate();
	//值小于10时，在前面补0
	function dateFilter(date){
	    if(date < 10){return "0"+date;}
	    return date;
	}
	function getLangDate(){
	    var dateObj = new Date(); //表示当前系统时间的Date对象
	    var year = dateObj.getFullYear(); //当前系统时间的完整年份值
	    var month = dateObj.getMonth()+1; //当前系统时间的月份值
	    var date = dateObj.getDate(); //当前系统时间的月份中的日
	    var day = dateObj.getDay(); //当前系统时间中的星期值
	    var weeks = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
	    var week = weeks[day]; //根据星期值，从数组中获取对应的星期字符串
	    var hour = dateObj.getHours(); //当前系统时间的小时值
	    var minute = dateObj.getMinutes(); //当前系统时间的分钟值
	    var second = dateObj.getSeconds(); //当前系统时间的秒钟值
	    var timeValue = "" +((hour >= 12) ? (hour >= 18) ? " 晚上" : " 下午" : " 上午" ); //当前时间属于上午、晚上还是下午
	    newDate = dateFilter(year)+"年"+dateFilter(month)+"月"+dateFilter(date)+"日 "+" "+dateFilter(hour)+":"+dateFilter(minute)+":"+dateFilter(second);
	    document.getElementById("nowTime").innerHTML = "亲爱的，"+currentUserName+"  "+timeValue+"好！ 欢迎使用 仓库管理系统。当前时间为： "+newDate+"　"+week;
	    setTimeout("getLangDate()",1000);
	}

	layui.use(['form','element','layer','jquery'],function(){
	    var form = layui.form,
	        layer = parent.layer === undefined ? layui.layer : top.layer,
	        element = layui.element;
	        $ = layui.jquery;
	    //上次登录时间【此处应该从接口获取，实际使用中请自行更换】
	    $(".loginTime").html(newDate.split("日")[0]+"日</br>"+newDate.split("日")[1]);
	    //icon动画
	    $(".panel a").hover(function(){
	        $(this).find(".layui-anim").addClass("layui-anim-scaleSpring");
	    },function(){
	        $(this).find(".layui-anim").removeClass("layui-anim-scaleSpring");
	    })
	    $(".panel a").click(function(){
	        parent.addTab($(this));
	    })
	   
		$.get("/notice/loadAllNotice?page=1&limit=5",function(data){
			var hotNewsHtml = '';
			if(data.count>0){
				var limit = data.count > 5 ? 5 : data.count;
				for(var i=0;i<limit;i++){
					hotNewsHtml += '<tr ondblclick="viewNews('+data.data[i].id+')">'
							+'<td align="left"><a href="javascript:;"> '+data.data[i].title+'</a></td>'
							+'<td>'+data.data[i].createtime.substring(0,10)+'</td>'
							+'</tr>';
				}
			}else {
				hotNewsHtml+='<h3 style="text-align: center">暂无公告！！！</h3>';
			}
			$(".hot_news").html(hotNewsHtml);
		});

		$.get("/consumable/loadWarningConsumable?page=1&limit=5",function (data) {
			var warningGoodsHtml='';
			if(data.count>0){
				var limit = data.count > 5 ? 5 : data.count;
				for(var i=0;i<limit;i++){
                    var replenish = data.data[i].threshold - data.data[i].quantity;
                    if(replenish < 0) replenish = 0;
					warningGoodsHtml += '<tr>'
                        +'<td>耗材名称：'+data.data[i].type+'</td>'
                        +'<td style="color:red;font-weight:bold;">'
                        +'库存:'+data.data[i].quantity+' <span class="layui-badge layui-bg-orange" title="预警阈值">阈:'+data.data[i].threshold+'</span>'
                        +' <span class="layui-badge" title="建议补货量">补:'+replenish+'</span>'
                        +'</td>'
                        +'</tr>';
				}
			}else {
				warningGoodsHtml+='<h3 style="text-align: center">暂无库存预警！</h3>';
			}
			$(".warningGoods").html(warningGoodsHtml);
		});

        // ECharts - 耗材库存概览
        var stockChart = echarts.init(document.getElementById('stockChart'));
        $.get("/consumable/loadConsumableCategoryStat", function(res){
            var rawData = res.data;
            if(!rawData) rawData = [];
            // 转换 Key 大小写 (Oracle 返回大写)
            rawData = rawData.map(function(item){
                return { name: item.name || item.NAME, value: item.value || item.VALUE };
            });

            // 排序
            rawData.sort(function(a, b) { return b.value - a.value; });
            var processedData = [];
            if (rawData.length > 5) {
                var otherValue = 0;
                for (var i = 0; i < rawData.length; i++) {
                    if (i < 5) {
                        processedData.push(rawData[i]);
                    } else {
                        otherValue += rawData[i].value;
                    }
                }
                if (otherValue > 0) {
                    processedData.push({ name: '其他', value: otherValue });
                }
            } else {
                processedData = rawData;
            }

            stockChart.setOption({
                tooltip: { trigger: 'item' },
                legend: { bottom: '0', left: 'center' },
                series: [
                    {
                        name: '耗材总量',
                        type: 'pie',
                        radius: ['40%', '65%'],
                        center: ['50%', '45%'],
                        avoidLabelOverlap: false,
                        itemStyle: { borderRadius: 10, borderColor: '#fff', borderWidth: 2 },
                        label: { show: false, position: 'center' },
                        emphasis: { label: { show: true, fontSize: 20, fontWeight: 'bold' } },
                        labelLine: { show: false },
                        data: processedData
                    }
                ]
            });
        });


        // ECharts - 资产类型分布 (在库)
        var assetTypeChart = echarts.init(document.getElementById('assetTypeChart'));
        $.get("/asset/loadInStockAssetTypeStat", function(res){
            var data = res.data;
            if(!data) data = [];
            // 转换 Key 大小写
            data = data.map(function(item){
                return { name: item.name || item.NAME, value: item.value || item.VALUE };
            });
            
            if(data.length === 0) {
                data = [{name: '暂无数据', value: 0}];
            }

            assetTypeChart.setOption({
                tooltip: { trigger: 'item' },
                legend: { bottom: '0', left: 'center' },
                series: [
                    {
                        name: '资产类型',
                        type: 'pie',
                        radius: '50%',
                        center: ['50%', '45%'],
                        data: data,
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowOffsetX: 0,
                                shadowColor: 'rgba(0, 0, 0, 0.5)'
                            }
                        }
                    }
                ]
            });
        });

        // ECharts - 耗材出入库趋势
        var trendChart = echarts.init(document.getElementById('trendChart'));
        $.get("/consumableRecord/loadOutportTrend", function(res){
            var data = res.data;
            if(!data) data = [];
            
            // 转换 Key 大小写
            data = data.map(function(item){
                return { 
                    date: item.date || item.DATE, 
                    inCount: item.inCount || item.INCOUNT || 0,
                    outCount: item.outCount || item.OUTCOUNT || 0
                };
            });

            var dates = data.map(function(item){ return item.date; });
            var inCounts = data.map(function(item){ return item.inCount; });
            var outCounts = data.map(function(item){ return item.outCount; });

            trendChart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { data: ['入库', '出库'], bottom: 0 },
                grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
                xAxis: { type: 'category', data: dates },
                yAxis: { type: 'value' },
                series: [
                    { 
                        name: '入库',
                        data: inCounts, 
                        type: 'line', 
                        smooth: true,
                        itemStyle: { color: '#91CC75' }
                    },
                    { 
                        name: '出库',
                        data: outCounts, 
                        type: 'line', 
                        smooth: true,
                        itemStyle: { color: '#EE6666' }
                    }
                ]
            });
        });

        // ECharts - 资产类型分布 (不在库)
        var assetOutTypeChart = echarts.init(document.getElementById('assetOutTypeChart'));
        $.get("/asset/loadOutStockAssetTypeStat", function(res){
            var data = res.data;
            if(!data) data = [];
            // 转换 Key 大小写
            data = data.map(function(item){
                return { name: item.name || item.NAME, value: item.value || item.VALUE };
            });
            
            if(data.length === 0) {
                data = [{name: '暂无数据', value: 0}];
            }

            assetOutTypeChart.setOption({
                tooltip: { trigger: 'item' },
                legend: { bottom: '0', left: 'center' },
                series: [
                    {
                        name: '资产类型',
                        type: 'pie',
                        radius: '50%',
                        center: ['50%', '45%'],
                        data: data,
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowOffsetX: 0,
                                shadowColor: 'rgba(0, 0, 0, 0.5)'
                            }
                        }
                    }
                ]
            });
        });

        window.onresize = function() {
            stockChart.resize();
            assetTypeChart.resize();
            trendChart.resize();
            assetOutTypeChart.resize();
        };

	});

	function viewNews(id){
		$.get("/notice/loadNoticeById",{id:id},function(news){
			layer.open({
				type:1,
				title:'查看公告',
				content:$("#desk_viewNewsDiv"),
				area:['800px','550px'],
				success:function(index){
					$("#view_title").html(news.data.title);
					$("#view_opername").html(news.data.opername);
					$("#view_createtime").html(news.data.createtime);
					$("#view_content").html(news.data.content);
				}
			});
		});
	}

	</script>
</body>
</html>
